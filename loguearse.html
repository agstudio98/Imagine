<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login - Imagine</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav id="nav"> 
        <button id="button"></button>
        <div class="logo">Imagine</div>
        <div id="menu">
            <ul>
                <li><a href="main.html" id="a1"></a></li>
                <li><a href="cartelera.html" id="a2"></a></li>
                <li><a href="loguearse.html" id="a3"></a></li>
                <li><a href="tienda.html" id="a4"></a></li>
            </ul>
        </div>
    </nav>

    <main class="login-container">
        <div class="login-box">
            <h1 style="margin-bottom: 20px;">Iniciar Sesión</h1>
            <input type="text" id="username" placeholder="Usuario">
            <input type="password" id="password" placeholder="Contraseña">
            <button id="check" style="width: 100%; padding: 10px; border-radius: 20px; border: none; background: blueviolet; color: white; cursor: pointer; margin-top: 10px;">Entrar</button>
            <p id="result" style="margin-top: 15px; font-weight: bold;"></p>
        </div>
    </main>

    <footer class="main-footer">
        <p>Ag Studio 2023</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
